# ============================================================
# docker-compose.dev.yml — Środowisko deweloperskie
# Uruchomienie: docker-compose -f docker-compose.dev.yml up
# ============================================================

version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skarpa-bytom-dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"        # bezpośredni dostęp bez proxy
    volumes:
      - skarpa_data_dev:/app/data
      - ./src:/app/src     # hot-reload kodu
      - ./views:/app/views
      - ./public:/app/public
    networks:
      - skarpa_dev
    environment:
      - NODE_ENV=development

volumes:
  skarpa_data_dev:

networks:
  skarpa_dev:
    driver: bridge
